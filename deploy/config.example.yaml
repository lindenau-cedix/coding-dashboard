# =============================================================================
# Coding Dashboard - Agent-Konfiguration
# Wird vom Backend gelesen (Pfad via CD_AGENTS_CONFIG_PATH, i.d.R.
# /etc/coding-dashboard/config.yaml).
#
# Platzhalter, die zur Laufzeit ersetzt werden:
#   {prompt}             -> die Aufgabenbeschreibung (inkl. AGENTS.md-Instruktion)
#   {project_dir}        -> der lokale Pfad des geklonten Projekt-Repos
#   {last_message_file}  -> temporäre Datei, in die die CLI ihre LETZTE Nachricht
#                           schreibt (z.B. codex --output-last-message). Ihr Inhalt
#                           wird als Endausgabe des Tasks übernommen (exakt, statt
#                           Transkript-Heuristik) und landet in AGENTS.md.
#
# command : argv-Liste (KEINE Shell). Token 0 ist das Binary.
# prompt_via : "arg"  -> {prompt} wird in die Argumente eingesetzt
#              "stdin" -> Prompt wird auf stdin geschrieben (kein {prompt} nötig)
# stream_format : "claude-json" (Claudes --output-format stream-json) | "raw"
# goal_command : optional. Template für den "Ziel"-Modus (/goal). Ist es gesetzt,
#                kann man dem Agenten statt einer Aufgabe ein Ziel geben; der
#                gesamte Verlauf bis zum Ziel zählt als ein Task. {prompt} ist das
#                Ziel. Fehlt das Feld, bietet der Agent keinen Ziel-Modus an.
# model_choices / effort_choices : optionale Listen, die das UI als Dropdown
#                anbietet (leer = kein Dropdown). Auswahl ist pro Task.
# model_args / effort_args : argv-Tokens, die bei einer Auswahl eingefügt werden
#                ({model}/{effort} werden ersetzt). Eingefügt vor einem
#                abschließenden "-" (stdin-Marker), sonst angehängt.
# =============================================================================

# Instruktion, die JEDER Aufgabe angehängt wird, damit Claude, Hermes und Codex über
# AGENTS.md einen gemeinsamen Projektkontext pflegen.
context_instruction: |
  Wichtiger Projekt-Kontext (immer beachten):
  1. Lies zuerst die Datei `AGENTS.md` im Projekt-Wurzelverzeichnis, falls vorhanden,
     um Struktur, Tech-Stack, bisherige Entscheidungen und den aktuellen Stand zu verstehen.
  2. Erledige anschliessend die oben beschriebene Aufgabe vollstaendig und sauber.
  3. Aktualisiere danach `AGENTS.md` (lege sie an, falls nicht vorhanden): beschreibe knapp
     und aktuell die Projektstruktur, den Tech-Stack, getroffene Entscheidungen, den aktuellen
     Stand sowie offene Punkte / Next Steps -- so, dass ein anderer KI-Agent (Claude Code,
     Hermes oder Codex) das Projekt sofort versteht und nahtlos weiterarbeiten kann.
  4. Committe oder pushe NICHT selbst -- das uebernimmt das Dashboard automatisch nach dem Task.

agents:
  claude:
    display_name: "Claude Code"
    # __CLAUDE_BIN__ wird vom Installer durch den absoluten Pfad ersetzt.
    command:
      - "claude"
      - "-p"
      - "{prompt}"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
    prompt_via: arg
    stream_format: claude-json
    # Aktiviert den "Ziel"-Modus: das Dashboard ruft Claude mit "/goal <Ziel>" auf.
    goal_command: "/goal {prompt}"
    # Pro Task wählbares Modell / Effort-Level (leer lassen = kein Dropdown).
    model_choices: ["opus", "sonnet", "haiku"]
    model_args: ["--model", "{model}"]
    effort_choices: ["low", "medium", "high", "xhigh", "max"]
    effort_args: ["--effort", "{effort}"]
    enabled: true
    # timeout_seconds: 3600

  hermes:
    display_name: "Hermes"
    # `hermes chat -q "<prompt>"`: einzelne, nicht-interaktive Query, die
    # Zwischenschritte (Tool-Previews) LIVE streamt. --yolo überspringt Approvals,
    # --accept-hooks läuft headless. AGENTS.md wird automatisch aus dem CWD geladen.
    # `-t <csv>` schränkt die Tool-Auswahl auf nicht-interaktive Toolsets ein
    # (ohne `clarify`, das in dieser Einbahn-Konsole keinen Platform-Callback
    # hätte und den Run mit "Clarify tool is not available in this execution
    # context." abbrechen würde). Interaktive TUI-Sessions (`hermes chat` ohne
    # -q) behalten absichtlich das volle Toolset, damit der User dort antworten
    # kann. Passende Liste: HERMES_NON_INTERACTIVE_TOOLSETS in backend/app/config.py.
    command:
      - "hermes"
      - "chat"
      - "-q"
      - "{prompt}"
      - "--yolo"
      - "--accept-hooks"
      - "-t"
      - "web,browser,terminal,file_search,read_file,write_file,edit_file,multi_edit,plan,session_search,kanban,image_gen,computer_use,video_gen,tts,spotify,delegate_task,todo,cronjob"
    prompt_via: arg
    stream_format: raw
    enabled: true
    env:
      HERMES_ACCEPT_HOOKS: "1"   # Shell-Hooks headless akzeptieren
      NO_COLOR: "1"              # Farbcodes unterdrücken (saubere Web-Konsole)
    # Verhindert, dass PYTHONPATH/PYTHONHOME des Backend-venv die (Python-)Hermes-
    # CLI stören (entspricht dem hermes-Wrapper, der diese Variablen leert).
    unset_env:
      - "PYTHONPATH"
      - "PYTHONHOME"
    # Alternative (nur Endergebnis, kein Live-Stream, am leisesten):
    #   command: ["hermes", "-z", "{prompt}"]

  codex:
    display_name: "Codex"
    # `codex exec`: einzelne, nicht-interaktive Aufgabe (mit Prompt von sich aus
    # headless; --ask-for-approval gibt es in aktuellen Versionen nicht mehr).
    # "-" liest den Prompt von stdin, damit lange Dashboard-Prompts nicht in der
    # Prozessliste landen. --output-last-message schreibt die LETZTE Nachricht
    # des Agenten in {last_message_file} -> exakte Endausgabe für AGENTS.md.
    command:
      - "codex"
      - "exec"
      - "--cd"
      - "{project_dir}"
      - "--sandbox"
      - "workspace-write"
      - "--color"
      - "never"
      - "--ephemeral"
      - "--output-last-message"
      - "{last_message_file}"
      - "-"
    prompt_via: stdin
    stream_format: raw
    model_choices: ["gpt-5.1-codex", "gpt-5.1-codex-max", "gpt-5.1-codex-mini", "gpt-5.1"]
    model_args: ["--model", "{model}"]
    effort_choices: ["low", "medium", "high", "xhigh"]
    effort_args: ["-c", "model_reasoning_effort={effort}"]
    enabled: true
    env:
      NO_COLOR: "1"
    unset_env:
      - "PYTHONPATH"
      - "PYTHONHOME"
