# nginx site for the Coding Dashboard.
# Placeholders (__UPPER__) are substituted by deploy/install.sh.
# Serves the built SPA and reverse-proxies /api (incl. WebSocket) to uvicorn.

map $http_upgrade $cd_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Built frontend (Vite dist)
    root __DIST__;
    index index.html;

    # API + WebSocket -> backend
    location /api/ {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $cd_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;            # stream agent output promptly
        proxy_read_timeout 3600s;       # allow long-running tasks
        proxy_send_timeout 3600s;
    }

    # SPA (HashRouter): always serve index.html, assets resolve by path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 25m;

    # ----------------------------------------------------------------------- #
    # TLS: after this works on :80, enable HTTPS with certbot:
    #   sudo apt-get install -y certbot python3-certbot-nginx
    #   sudo certbot --nginx -d __DOMAIN__
    # certbot rewrites this block to listen on 443 and redirects 80 -> 443.
    # ----------------------------------------------------------------------- #
}
