# =============================================================================
# Coding Dashboard — Docker Compose deployment
#
# Self-contained-ish alternative to the systemd installer (deploy/install.sh):
# the whole stack (FastAPI backend + built SPA + claude/codex CLIs + git) runs in
# ONE container. Claude + Codex log in interactively and persist in the cd-home
# named volume.
#
# Hermes is the exception: it does NOT run inside the container at all. Instead
# the container invokes the HOST's `hermes` over SSH (`ssh user@host '… hermes …'`)
# so Hermes runs as a single process tree ON THE HOST. This avoids the duplicate
# Hermes runtime you got from mirroring the host ~/.hermes into the container —
# which made Hermes' cronjobs and paired channels (WhatsApp/Telegram) fire twice
# and answer twice. Now there is exactly one Hermes (the host's); the dashboard
# just drives it remotely for each task/session.
#
# The dashboard's data (SQLite DB + cloned repos + worktrees) stays in the cd-data
# NAMED VOLUME — private to the container. The host's Hermes cannot see it, so for
# each Hermes run the dashboard COPIES the project into a small staging dir that IS
# shared with the host (a /tmp subfolder bind-mounted at an IDENTICAL path on both
# sides, CD_HERMES_STAGING_HOST_DIR, default /tmp/coding-dashboard-hermes). Hermes
# edits that copy over SSH; afterwards the dashboard merges the result back into the
# repo in cd-data and pushes (a merge conflict is left on a branch for you to merge
# and then Pull). The copy is cleaned up after each task.
#
# IMPORTANT — host prerequisites for the SSH-driven Hermes (see README):
#   1. Host runs sshd and has Hermes installed + logged in for CD_HERMES_SSH_USER.
#   2. Create an SSH keypair; put the PRIVATE key at CD_HERMES_SSH_KEY_HOST (below,
#      default ~/.ssh/id_coding_dashboard) and append its .pub to that user's
#      ~/.ssh/authorized_keys. The container mounts the private key read-only.
#   3. The staging dir (CD_HERMES_STAGING_HOST_DIR, default /tmp/coding-dashboard-hermes)
#      must exist on the host and be owned by APP_UID:APP_GID — the SAME user that
#      runs Hermes — so the host's Hermes can read/write the staged project copy and
#      file ownership matches the container.
#
# Quick start (from the repo root):
#   cp deploy/docker/coding-dashboard.docker.env.example deploy/docker/coding-dashboard.docker.env
#   mkdir -p /tmp/coding-dashboard-hermes                              # host staging dir (owned by you)
#   mkdir -p /var/lock/coding-dashboard && chown "$(id -u)":"$(id -g)" /var/lock/coding-dashboard
#   # the dashboard drops one lock file per active task/goal/session here; without
#   # the bind-mount the operator on the host can't see whether something is running
#   ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_coding_dashboard          # container -> host key
#   cat ~/.ssh/id_coding_dashboard.pub >> ~/.ssh/authorized_keys       # let the container in
#   APP_UID=$(id -u) APP_GID=$(id -g) docker compose build
#   openssl rand -hex 32                                               # -> CD_SECRET_KEY
#   # Auth is OFF by default (e.g. behind a Cloudflare tunnel). To require a login:
#   docker compose run --rm dashboard python -m app.cli hash-password 'choose-a-password'
#   # edit deploy/docker/coding-dashboard.docker.env: paste secret + GitHub token, and
#   #   set CD_HERMES_SSH_USER (the host user that runs Hermes) to enable Hermes.
#   # Optional: enable the heartbeat (auto-poll GitHub issues + auto-spawn Claude Code
#   #   tasks) by setting CD_HEARTBEAT_ENABLED=true in the same .env. See
#   #   coding-dashboard.docker.env.example for the rest of the CD_HEARTBEAT_* knobs.
#   docker compose up -d
#   docker compose exec dashboard claude        # claude + codex log in once -> cd-home volume
#   docker compose exec dashboard codex login   #   "
#   #   Hermes needs no login here — it runs on the host as CD_HERMES_SSH_USER.
#
# By default the app is published on 127.0.0.1:8000 only — put a TLS reverse
# proxy in front, or set CD_BIND_ADDR=0.0.0.0 (and CD_HOST_PORT) to expose it.
# =============================================================================

services:
  dashboard:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        # Same-origin SPA (the backend serves it). For a separately-hosted
        # frontend, bake a public API base instead.
        VITE_API_BASE: ""
        # Hermes is NOT baked into the image — it runs on the host over SSH (see
        # the header + entrypoint). Set these only if you want a SELF-CONTAINED
        # in-image Hermes instead (then also leave CD_HERMES_SSH_USER empty).
        HERMES_NPM_PKG: "${HERMES_NPM_PKG:-}"
        HERMES_INSTALL_CMD: "${HERMES_INSTALL_CMD:-}"
        # UID/GID of the non-root 'app' user. Match the host user that runs Hermes
        # and owns the shared staging dir (CD_HERMES_STAGING_HOST_DIR), so the host's
        # Hermes and the container agree on file ownership in the staged copy. Keep
        # it stable across rebuilds (a change orphans the chowned cd-home volume).
        APP_UID: "${APP_UID:-1000}"
        APP_GID: "${APP_GID:-1000}"
    image: coding-dashboard:latest
    restart: unless-stopped
    # Secrets + git identity + CORS + the CD_HERMES_SSH_* knobs. Copy the .example.
    env_file:
      - deploy/docker/coding-dashboard.docker.env
    environment:
      # Where the dashboard stages a COPY of the project for the host's Hermes.
      # MUST equal the host path of the staging bind mount below so {project_dir}
      # resolves to the same files in the container and on the host.
      - CD_HERMES_STAGING_DIR=${CD_HERMES_STAGING_HOST_DIR:-/tmp/coding-dashboard-hermes}
      # Host-visible lock dir: a tiny shared path where the dashboard stamps
      # ``<kind>-<id>.lock`` while a task/goal/session is active.  Must equal
      # CD_HOST_LOCK_HOST_DIR below so writes from inside the container land
      # on the host.  Defaults to /var/lock/coding-dashboard (a conventional
      # lock-dir path shipped with every distro); override only if you need
      # an unusual layout.
      - CD_HOST_LOCK_DIR=${CD_HOST_LOCK_HOST_DIR:-/var/lock/coding-dashboard}
      # Docker normally cannot run Codex's bubblewrap workspace sandbox unless the
      # host allows unprivileged user namespaces. The dashboard already isolates
      # each run in a worktree/staging copy, so Docker defaults Codex to no
      # inner sandbox; override to workspace-write if your host supports it.
      - CD_CODEX_SANDBOX=${CD_CODEX_SANDBOX:-danger-full-access}
      # Heartbeat (auto-poll GitHub issues + auto-spawn Claude Code tasks).
      # Default off; set CD_HEARTBEAT_ENABLED=true to turn it on. The other
      # CD_HEARTBEAT_* knobs (interval, cooldown, agent key, labels, ...) are
      # documented in coding-dashboard.docker.env.example.
      - CD_HEARTBEAT_ENABLED=${CD_HEARTBEAT_ENABLED:-false}
      - CD_HEARTBEAT_INTERVAL_SECONDS=${CD_HEARTBEAT_INTERVAL_SECONDS:-900}
      - CD_HEARTBEAT_MAX_CONCURRENT=${CD_HEARTBEAT_MAX_CONCURRENT:-2}
      - CD_HEARTBEAT_COOLDOWN_MINUTES=${CD_HEARTBEAT_COOLDOWN_MINUTES:-30}
      - CD_HEARTBEAT_AGENT_KEY=${CD_HEARTBEAT_AGENT_KEY:-claude}
      - CD_HEARTBEAT_LOOKBACK_HOURS=${CD_HEARTBEAT_LOOKBACK_HOURS:-24}
      - CD_HEARTBEAT_LABELS=${CD_HEARTBEAT_LABELS:-}
      # Post a status comment on the GitHub issue after a heartbeat-spawned
      # task lands a commit. Default: true.
      - CD_HEARTBEAT_COMMENT_ON_SUCCESS=${CD_HEARTBEAT_COMMENT_ON_SUCCESS:-true}
      # Close the issue automatically when the fix lands cleanly on the
      # default branch (merge_state=merged + pushed=true). Default: true.
      - CD_HEARTBEAT_CLOSE_ON_MERGE=${CD_HEARTBEAT_CLOSE_ON_MERGE:-true}
    # Reach the host's sshd from inside the container via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # host -> container. Defaults to localhost-only; override via env:
      #   CD_BIND_ADDR=0.0.0.0 CD_HOST_PORT=8080 docker compose up -d
      - "${CD_BIND_ADDR:-127.0.0.1}:${CD_HOST_PORT:-8000}:8000"
    volumes:
      # Data (SQLite DB + cloned repos + worktrees) stays PRIVATE to the container
      # in a named volume — the host never sees it directly.
      - cd-data:/var/lib/coding-dashboard
      - cd-config:/etc/coding-dashboard     # generated config.yaml (edit + persists)
      - cd-home:/home/app                   # claude + codex logins: ~/.claude, ~/.codex
      # Small staging dir SHARED with the host at an IDENTICAL path: the dashboard
      # copies a project here for the host's Hermes to edit, then merges it back.
      # Must exist on the host + be owned by APP_UID:APP_GID. Override with
      # CD_HERMES_STAGING_HOST_DIR (the container path tracks it via the env above).
      - "${CD_HERMES_STAGING_HOST_DIR:-/tmp/coding-dashboard-hermes}:${CD_HERMES_STAGING_HOST_DIR:-/tmp/coding-dashboard-hermes}"
      # Private SSH key the container uses to run the host's Hermes as
      # CD_HERMES_SSH_USER. Read-only; its .pub must be in that user's
      # authorized_keys on the host. Override the host source via CD_HERMES_SSH_KEY_HOST.
      - "${CD_HERMES_SSH_KEY_HOST:-${HOME}/.ssh/id_coding_dashboard}:/home/app/.ssh/id_hermes:ro"
      # Host-visible lock dir: the dashboard drops one lock file here per
      # active task/goal/session.  MUST equal CD_HOST_LOCK_DIR (above) so the
      # container path tracks the host path.  Default /var/lock/coding-dashboard
      # (the conventional /var/lock is shipped by the OS, but the dashboard's
      # subdir may not exist yet — a fresh container creates it on first run).
      # Override with CD_HOST_LOCK_HOST_DIR (host) / CD_HOST_LOCK_DIR (container,
      # auto-derived in compose).  Bind-mounting at an IDENTICAL path host<->container
      # mirrors the staging-dir pattern so files the dashboard writes end up on
      # the host.  Mounting root_squashed means we cannot see anything else in
      # /var/lock on the host, only the dashboard's own subdir.
      - "${CD_HOST_LOCK_HOST_DIR:-/var/lock/coding-dashboard}:${CD_HOST_LOCK_HOST_DIR:-/var/lock/coding-dashboard}"

volumes:
  cd-data:
  cd-config:
  cd-home:
